<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rajasthan - Bharat Darshan</title>
  <style>
    body {
      background-color: yellow;
      font-family: "Dauphin", "Palatino Linotype", "Book Antiqua", Palatino, serif;
      margin: 0;
      padding: 30px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .back-btn {
      align-self: flex-start;
      background: #8b1a1a;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 20px;
      font-size: 1rem;
      cursor: pointer;
      margin-bottom: 24px;
      font-family: inherit;
      letter-spacing: 1px;
      text-decoration: none;
      display: inline-block;
    }
    h1 {
      font-size: 2.4rem;
      margin-bottom: 16px;
      color: #111;
      letter-spacing: 2px;
    }
    .img-frame {
      width: 100%;
      max-width: 680px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      margin-bottom: 24px;
      border: 3px solid #8b1a1a;
    }
    .img-frame img {
      width: 100%;
      display: block;
      max-height: 420px;
      object-fit: cover;
    }
    .desc {
      background: #fff0f0;
      border: 2px solid #8b1a1a;
      border-radius: 12px;
      padding: 18px 28px;
      max-width: 680px;
      width: 100%;
      font-size: 1.1rem;
      line-height: 1.8;
      color: #333;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <a class="back-btn" href="index.html">← Back</a>
  <h1>Rajasthan</h1>
  <div class="img-frame">
    <img src="rajasthan.jpg" alt="Rajasthan Fort" />
  </div>
  <div class="desc">
    Rajasthan — The Land of Kings. Home to majestic forts and palaces, golden Thar Desert,
    vibrant folk culture, colourful festivals, and royal Rajput history.
  </div>
</body>
</html>
