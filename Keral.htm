<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kerala - Bharat Darshan</title>
  <style>
    body {
      background-color: yellow;
      font-family: "Dauphin", "Palatino Linotype", "Book Antiqua", Palatino, serif;
      margin: 0;
      padding: 30px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .back-btn {
      align-self: flex-start;
      background: #2d7a2d;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 20px;
      font-size: 1rem;
      cursor: pointer;
      margin-bottom: 24px;
      font-family: inherit;
      letter-spacing: 1px;
      text-decoration: none;
      display: inline-block;
    }
    h1 {
      font-size: 2.4rem;
      margin-bottom: 16px;
      color: #111;
      letter-spacing: 2px;
    }
    .img-frame {
      width: 100%;
      max-width: 680px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      margin-bottom: 24px;
      border: 3px solid #2d7a2d;
    }
    .img-frame img {
      width: 100%;
      display: block;
      max-height: 420px;
      object-fit: cover;
    }
    .desc {
      background: #e8f5e9;
      border: 2px solid #2d7a2d;
      border-radius: 12px;
      padding: 18px 28px;
      max-width: 680px;
      width: 100%;
      font-size: 1.1rem;
      line-height: 1.8;
      color: #333;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <a class="back-btn" href="index.html">← Back</a>
  <h1>Kerala</h1>
  <div class="img-frame">
    <img src="kerala.jpg" alt="Kerala Backwaters" />
  </div>
  <div class="desc">
    Kerala — God's Own Country. Famous for its serene backwaters, lush green landscapes,
    houseboat cruises, and rich cultural heritage along the Malabar Coast.
  </div>
</body>
</html>
